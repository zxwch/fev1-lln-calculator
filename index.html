            <h1>🫁 FEV1/FVC LLN计算工具</h1>
            <p>四川大学华西医院中西医结合慢性咳嗽与哮喘专病 | 基于参考方程的下限计算工具</p>
        </div>

        <div class="content">
            <div class="info-box">
                <p><strong>说明：</strong>本工具用于计算FEV1/FVC的下限值（LLN），用于判断患者的肺功能是否正常。</p>
                <p><strong>输入：</strong>性别、身高（厘米）、FEV1/FVC实测值</p>
                <p><strong>输出：</strong>LLN（下限值，保留3位小数）</p>
            </div>

            <form id="calculationForm">
                <div class="form-section">
                    <div class="section-title">患者基本信息</div>

                    <div class="form-group">
                        <label>性别</label>
                        <div class="radio-group">
                            <div class="radio-item">
                                <label>
                                    <input type="radio" name="gender" value="male" required>
                                    <span>男</span>
                                </label>
                            </div>
                            <div class="radio-item">
                                <label>
                                    <input type="radio" name="gender" value="female" required>
                                    <span>女</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="height">身高 (厘米，例如：165)</label>
                        <input type="number" id="height" name="height" placeholder="例如：165" min="150" max="190" step="1" required>
                    </div>

                    <div class="form-group">
                        <label for="fev1fvc">FEV1/FVC 实测值 (保留2位小数，范围：0.25-0.80)</label>
                        <input type="number" id="fev1fvc" name="fev1fvc" placeholder="例如：0.75" min="0.25" max="0.80" step="0.01" required>
                    </div>
                </div>

                <div class="buttons">
                    <button type="button" class="btn btn-primary" onclick="calculateLLN()">🔍 计算LLN</button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">🔄 重置表单</button>
                </div>
            </form>

            <div id="result">
                <div class="result-header">计算结果</div>

                    </div>

                        <span class="result-label">身高</span>

                    </div>

                </div>
            </div>

                '0.78': [0.64, 0.64, 0.639, 0.638, 0.638, 0.637, 0.636, 0.636, 0.635, 0.634, 0.634, 0.633, 0.633, 0.632, 0.631, 0.631, 0.63, 0.63, 0.629, 0.628, 0.628, 0.627, 0.627, 0.626, 0.625, 0.625, 0.624, 0.624, 0.623, 0.623, 0.622, 0.622, 0.621, 0.62, 0.62, 0.619, 0.619, 0.618, 0.618, 0.617, 0.617],
                '0.79': [0.638, 0.637, 0.636, 0.636, 0.635, 0.634, 0.634, 0.633, 0.633, 0.632, 0.631, 0.631, 0.63, 0.629, 0.629, 0.628, 0.628, 0.627, 0.626, 0.626, 0.625, 0.625, 0.624, 0.623, 0.623, 0.622, 0.622, 0.621, 0.621, 0.62, 0.62, 0.619, 0.618, 0.618, 0.617, 0.617, 0.616, 0.616, 0.615, 0.615, 0.614],
                '0.80': [0.635, 0.635, 0.634, 0.633, 0.633, 0.632, 0.631, 0.631, 0.63, 0.629, 0.629, 0.628, 0.628, 0.627, 0.626, 0.626, 0.625, 0.625, 0.624, 0.623, 0.623, 0.622, 0.622, 0.621, 0.62, 0.62, 0.619, 0.619, 0.618, 0.618, 0.617, 0.617, 0.616, 0.615, 0.615, 0.614, 0.614, 0.613, 0.613, 0.612, 0.612],
            },
        };


        // 身高索引映射（1.5-1.9米，间隔0.01米）
        // 输入的heightInMeters已经是米为单位
        const getHeightIndex = (heightInMeters) => {
            const heightIndex = Math.round((heightInMeters - 1.5) / 0.01);
            return Math.max(0, Math.min(40, heightIndex));
        };

        // FEV1/FVC四舍五入到0.01
        const roundFEV1FVC = (value) => {
            return Math.round(value * 100) / 100;
        };

        // 计算LLN
        function calculateLLN() {
            const form = document.getElementById('calculationForm');
            const gender = form.querySelector('input[name="gender"]:checked');
            const height = parseFloat(document.getElementById('height').value);
            const fev1fvc = parseFloat(document.getElementById('fev1fvc').value);

            // 验证输入
            if (!gender) {
                alert('请选择性别');
                return;
            }
            if (!height || height < 150 || height > 190) {
                alert('请输入有效的身高（150-190厘米）');
                return;
            }
            if (isNaN(fev1fvc) || fev1fvc < 0.25 || fev1fvc > 0.80) {
                alert('请输入有效的FEV1/FVC值（0.25-0.80）');
                return;
            }

            const genderKey = gender.value;
            const roundedFEV1FVC = roundFEV1FVC(fev1fvc);
            // 将cm转换为米
            const heightInMeters = height / 100;
            const heightIndex = getHeightIndex(heightInMeters);

            // 查找LLN
            let lln = null;
            const fev1fvcStr = roundedFEV1FVC.toFixed(2);

            if (llnData[genderKey] && llnData[genderKey][fev1fvcStr]) {
                lln = llnData[genderKey][fev1fvcStr][heightIndex];
            }

            if (lln === null) {
                alert('未找到对应的LLN数据，请检查FEV1/FVC值是否在0.25-0.80范围内');
                return;
            }

            // 显示结果
            document.getElementById('resultGender').textContent = genderKey === 'male' ? '男' : '女';
            document.getElementById('resultHeight').textContent = height + ' 米';
            document.getElementById('resultFEV1FVC').textContent = fev1fvc.toFixed(2);
            document.getElementById('resultLLN').textContent = lln.toFixed(3);

            // 解释结果
            let explanation = '';
            if (fev1fvc >= lln) {
                explanation = `<strong>✅ 正常：</strong>患者的FEV1/FVC值为${fev1fvc.toFixed(2)}，高于LLN（${lln.toFixed(2)}），提示肺功能正常。<br><br>`;
            } else {
                explanation = `<strong>⚠️ 异常：</strong>患者的FEV1/FVC值为${fev1fvc.toFixed(2)}，低于LLN（${lln.toFixed(2)}），提示存在阻塞性通气功能障碍。<br><br>`;
            }

            explanation += `<strong>参考标准：</strong><br>
            <ul>
                <li>LLN（Lower Limit of Normal）：95%置信区间下限</li>
                <li>当实测值≥LLN时，认为肺功能正常</li>
                <li>当实测值&lt;LLN时，提示存在阻塞性通气功能障碍</li>
                <li>本工具基于参考方程计算LLN</li>
            </ul>`;

            document.getElementById('explanation').innerHTML = explanation;
            document.getElementById('result').style.display = 'block';
            
            // 滚动到结果区域
            document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 重置表单
        function resetForm() {
            document.getElementById('calculationForm').reset();
            document.getElementById('result').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
